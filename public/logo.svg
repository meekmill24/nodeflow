<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22D3EE;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  {/* Outer Node Circle */}
  <circle cx="50" cy="50" r="45" stroke="url(#grad1)" stroke-width="2" stroke-dasharray="10 5" />
  {/* The "N" inner flow */}
  <path d="M30 70V30L50 50L70 30V70" stroke="url(#grad1)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)" />
  {/* Flow dots */}
  <circle cx="30" cy="30" r="4" fill="#22D3EE" filter="url(#glow)">
    <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="70" cy="70" r="4" fill="#6366F1" filter="url(#glow)">
    <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite" />
  </circle>
</svg>
